name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          echo "Xcode Path: $(xcode-select -p)"
          xcodebuild -version
          swift --version

      - name: Check XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Install create-dmg
        run: brew install create-dmg || true

      - name: Update Version in project.yml
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          # 提取主版本号（用于 CURRENT_PROJECT_VERSION）
          MAJOR_VERSION=$(echo $VERSION | cut -d. -f1)
          echo "Updating project.yml with version: $VERSION (build: $MAJOR_VERSION)"
          # 使用 sed 替换版本号（macOS 需要 -i '' 指定空备份扩展名）
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: $VERSION/" project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $MAJOR_VERSION/" project.yml
          cat project.yml | grep -E "(MARKETING_VERSION|CURRENT_PROJECT_VERSION)"

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # macOS 26: .appex 必须用 xcodebuild 签名，手动 codesign 可能丢 entitlements
      - name: Setup Certificate & Sign Extension
        env:
          APPLE_SIGNING_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
          APPLE_SIGNING_CERTIFICATE_PWD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_APP_PROVISIONING_PROFILE: ${{ secrets.APPLE_APP_PROVISIONING_PROFILE }}
          APPLE_EXTENSION_PROVISIONING_PROFILE: ${{ secrets.APPLE_EXTENSION_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/sign.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "$APPLE_SIGNING_CERTIFICATE" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_SIGNING_CERTIFICATE_PWD" -k "$KEYCHAIN_PATH" -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" 2>/dev/null || true

          echo "=== 证书列表 ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          install_profile_from_base64() {
            local profile_b64="$1"
            local label="$2"
            local require_app_group="$3"
            if [[ -z "$profile_b64" ]]; then
              return 1
            fi

            local profile_path="$RUNNER_TEMP/${label}.provisionprofile"
            local profile_plist="$RUNNER_TEMP/${label}.plist"
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            echo "$profile_b64" | base64 -d > "$profile_path"
            security cms -D -i "$profile_path" > "$profile_plist"

            local uuid
            local name
            uuid=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$profile_plist")
            name=$(/usr/libexec/PlistBuddy -c 'Print Name' "$profile_plist")
            cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.provisionprofile"
            echo "✅ 安装 provisioning profile: $name ($uuid)"

            if [[ "$require_app_group" == "1" ]] && ! /usr/libexec/PlistBuddy -c 'Print Entitlements:com.apple.security.application-groups' "$profile_plist" >/dev/null 2>&1; then
              echo "❌ $label provisioning profile 缺少 application-groups entitlement"
              exit 1
            fi

            if [[ "$label" == "app" ]]; then
              echo "WAIFUX_APP_PROVISIONING_PROFILE_UUID=$uuid" >> "$GITHUB_ENV"
              echo "WAIFUX_APP_PROVISIONING_PROFILE_PATH=$profile_path" >> "$GITHUB_ENV"
            else
              echo "WAIFUX_EXTENSION_PROVISIONING_PROFILE_UUID=$uuid" >> "$GITHUB_ENV"
              echo "WAIFUX_EXTENSION_PROVISIONING_PROFILE_PATH=$profile_path" >> "$GITHUB_ENV"
            fi
            PROFILE_UUID="$uuid"
          }

          PROFILE_UUID=""
          if install_profile_from_base64 "$APPLE_APP_PROVISIONING_PROFILE" "app" "1"; then
            APP_PROFILE_UUID="$PROFILE_UUID"
          else
            APP_PROFILE_UUID=""
            echo "❌ 未配置 APPLE_APP_PROVISIONING_PROFILE，Developer ID 签名会丢失 App application-groups entitlement"
            exit 1
          fi

          PROFILE_UUID=""
          if install_profile_from_base64 "$APPLE_EXTENSION_PROVISIONING_PROFILE" "extension" "1"; then
            EXT_PROFILE_UUID="$PROFILE_UUID"
          else
            EXT_PROFILE_UUID=""
            echo "❌ 未配置 APPLE_EXTENSION_PROVISIONING_PROFILE，Developer ID 签名会丢失扩展 application-groups entitlement"
            exit 1
          fi

          echo "🔨 构建扩展..."
          EXT_ENTITLEMENTS="WaifuXWallpaperExtension/WaifuXWallpaperExtension.entitlements"
          EXT_BUILD_LOG="$RUNNER_TEMP/extension-build.log"
          if [[ -n "$EXT_PROFILE_UUID" ]]; then
            if ! xcodebuild -project WaifuX.xcodeproj \
              -target WaifuXWallpaperExtension \
              -configuration Release \
              CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_ENTITLEMENTS="$EXT_ENTITLEMENTS" \
              PROVISIONING_PROFILE="$EXT_PROFILE_UUID" \
              ENABLE_HARDENED_RUNTIME=YES \
              OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
              clean build > "$EXT_BUILD_LOG" 2>&1; then
              tail -80 "$EXT_BUILD_LOG"
              exit 1
            fi
          else
            if ! xcodebuild -project WaifuX.xcodeproj \
              -target WaifuXWallpaperExtension \
              -configuration Release \
              CODE_SIGNING_ALLOWED=NO \
              clean build > "$EXT_BUILD_LOG" 2>&1; then
              tail -80 "$EXT_BUILD_LOG"
              exit 1
            fi
          fi
          tail -30 "$EXT_BUILD_LOG"

          BUILT_APPEX=$(find build ~/Library/Developer/Xcode/DerivedData \
            \( -path "*/Release/WaifuXWallpaperExtension.appex" -o -path "*/Build/Products/Release/WaifuXWallpaperExtension.appex" \) \
            -type d -print 2>/dev/null | head -1)
          if [[ -n "$BUILT_APPEX" && -d "$BUILT_APPEX" ]]; then
            if [[ -n "$EXT_PROFILE_UUID" ]]; then
              echo "🔏 使用 provisioning profile entitlements 重签扩展..."
              EXT_RESIGN_ENTITLEMENTS="$RUNNER_TEMP/extension-resign-entitlements.plist"
              /usr/libexec/PlistBuddy -x -c 'Print Entitlements' "$RUNNER_TEMP/extension.plist" > "$EXT_RESIGN_ENTITLEMENTS"
              /usr/libexec/PlistBuddy -c 'Add :com.apple.security.app-sandbox bool true' "$EXT_RESIGN_ENTITLEMENTS" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c 'Set :com.apple.security.app-sandbox true' "$EXT_RESIGN_ENTITLEMENTS"
              mkdir -p "$BUILT_APPEX/Contents"
              cp "$RUNNER_TEMP/extension.provisionprofile" "$BUILT_APPEX/Contents/embedded.provisionprofile"
              codesign --force --timestamp --options runtime --entitlements "$EXT_RESIGN_ENTITLEMENTS" -s "$APPLE_SIGNING_IDENTITY" "$BUILT_APPEX"
            else
              echo "🔏 签名扩展..."
              codesign --force --timestamp --options runtime --entitlements "$EXT_ENTITLEMENTS" -s "$APPLE_SIGNING_IDENTITY" "$BUILT_APPEX"
            fi
            rm -rf ./WaifuXWallpaperExtension.appex
            cp -R "$BUILT_APPEX" ./WaifuXWallpaperExtension.appex
            echo "✅ 扩展签名成功"
            echo "=== 验证 entitlements ==="
            ENT_CHECK=$(codesign -d --entitlements - ./WaifuXWallpaperExtension.appex 2>/dev/null || true)
            echo "$ENT_CHECK" | head -20
            if ! echo "$ENT_CHECK" | grep -q "com.apple.security.application-groups"; then
              echo "❌ 预签名扩展缺少 application-groups entitlement"
              echo "请在 GitHub Secrets 配置 APPLE_EXTENSION_PROVISIONING_PROFILE（base64 编码的 Developer ID provisioning profile）"
              exit 1
            fi
          else
            echo "❌ xcodebuild 未产出 .appex"
            exit 1
          fi

      - name: Build & Package
        env:
          WAIFUX_SKIP_DMG: "1"
        run: |
          chmod +x ./scripts/package.sh
          ./scripts/package.sh

      - name: Sign & Notarize
        env:
          APPLE_SIGNING_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
          APPLE_SIGNING_CERTIFICATE_PWD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          # keychain 已在 Sign Extension 步骤中设置
          KEYCHAIN_PATH="$RUNNER_TEMP/sign.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Signing embedded binaries..."
          strip_unsupported_slices() {
            local root="$1"
            if [[ ! -d "$root" ]] || ! command -v lipo >/dev/null 2>&1; then
              return 0
            fi
            find "$root" -type f | while read -r f; do
              if file "$f" | grep -q "Mach-O" && lipo -info "$f" 2>/dev/null | grep -q "i386"; then
                local mode
                mode="$(stat -f "%Lp" "$f" 2>/dev/null || echo "")"
                echo "  Removing i386 slice: ${f#build/WaifuX.app/Contents/Resources/}"
                lipo "$f" -remove i386 -output "$f.tmp"
                mv "$f.tmp" "$f"
                if [[ -n "$mode" ]]; then
                  chmod "$mode" "$f" 2>/dev/null || true
                fi
              fi
            done
          }

          should_skip_embedded_code() {
            local f="$1"
            case "$f" in
              */Contents/Resources/Resources/steamcmd/steamclient.dylib|*/Contents/Resources/steamcmd/steamclient.dylib)
                echo "  Skipping Valve-signed steamclient.dylib: ${f#build/WaifuX.app/Contents/Resources/}"
                return 0
                ;;
            esac
            return 1
          }

          sign_embedded_code() {
            local f="$1"
            if should_skip_embedded_code "$f"; then
              return 0
            fi
            # macOS 26: codesign --entitlements 对 .appex 不再生效。
            # 优先使用仓库中预签名的 .appex（本地 xcodebuild 签名后提交）。
            if [[ "$f" == *.appex ]]; then
              local pre_signed="WaifuXWallpaperExtension.appex"
              if [[ -d "$pre_signed" ]]; then
                echo "  Using pre-signed extension: $pre_signed"
                rm -rf "$f"
                cp -R "$pre_signed" "$f"
                echo "  ✅ $(basename "$f") (pre-signed)"
              else
                echo "  Signing extension via xcodebuild: $(basename "$f")"
                local ext_entitlements="WaifuXWallpaperExtension/WaifuXWallpaperExtension.entitlements"
                local ext_build_log="$RUNNER_TEMP/embedded-extension-build.log"
                if ! xcodebuild -project WaifuX.xcodeproj \
                  -target WaifuXWallpaperExtension \
                  -configuration Release \
                  CODE_SIGNING_ALLOWED=NO \
                  clean build > "$ext_build_log" 2>&1; then
                  tail -80 "$ext_build_log"
                  exit 1
                fi
                tail -20 "$ext_build_log"
                local built_appex
                built_appex=$(find build ~/Library/Developer/Xcode/DerivedData \
                  \( -path "*/Release/WaifuXWallpaperExtension.appex" -o -path "*/Build/Products/Release/WaifuXWallpaperExtension.appex" \) \
                  -type d -print 2>/dev/null | head -1)
                if [[ -n "$built_appex" && -d "$built_appex" ]]; then
                  rm -rf "$f"
                  cp -R "$built_appex" "$f"
                  codesign --force --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" --options=runtime --timestamp --entitlements "$ext_entitlements" "$f"
                  echo "  ✅ $(basename "$f") (xcodebuild signed)"
                else
                  echo "  ⚠️ xcodebuild did not produce .appex, falling back to codesign"
                  local SIGN_ARGS=(--force --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" --options=runtime --timestamp)
                  if [[ -f "$ext_entitlements" ]]; then
                    SIGN_ARGS+=(--entitlements "$ext_entitlements")
                  fi
                  codesign "${SIGN_ARGS[@]}" "$f"
                fi
              fi
              local ent_check
              ent_check=$(codesign -d --entitlements - "$f" 2>/dev/null || true)
              if ! echo "$ent_check" | grep -q "com.apple.security.application-groups"; then
                echo "  ❌ Extension missing application-groups entitlement: $f"
                echo "  Debug entitlements:"
                echo "$ent_check" | head -20
                exit 1
              fi
              return 0
            fi
            # 对 framework：先清除旧签名封印，再用 --deep 递归签全部内嵌组件
            if [[ "$f" == *.framework ]]; then
              echo "  Signing framework with --deep: $(basename "$f")"

              # 清除旧签名封印
              local fw_vers_dir
              fw_vers_dir="$f"
              if [[ -d "$f/Versions" ]]; then
                fw_vers_dir="$f/Versions/$(ls "$f/Versions" 2>/dev/null | grep -v Current | head -1)"
                [[ -z "$fw_vers_dir" || ! -d "$fw_vers_dir" ]] && fw_vers_dir="$f"
              fi
              echo "    Cleaning old code signature in: $(basename "$f")"
              rm -rf "$fw_vers_dir/_CodeSignature" "$f/_CodeSignature" 2>/dev/null || true

              # --deep 递归签名 framework 及其内嵌 XPC Services、app bundles、独立可执行文件
              codesign --force --deep --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" --options=runtime --timestamp "$f" || {
                echo "    ❌ --deep failed, falling back to component-wise signing"
                # 回退：显式签各个组件
                find "$f" -name "*.xpc" -type d 2>/dev/null | while read -r xpc; do
                  echo "    XPC: ${xpc#"$f/"}"
                  codesign --force --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" --options=runtime --timestamp "$xpc" || exit 1
                done
                find "$f" -name "*.app" -type d 2>/dev/null | while read -r app; do
                  echo "    App: ${app#"$f/"}"
                  codesign --force --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" --options=runtime --timestamp "$app" || exit 1
                done
                # 遍历 Versions/ 下所有非符号链接目录中的独立可执行文件
                while IFS= read -r -d '' vers_dir; do
                  find "$vers_dir" -maxdepth 1 -type f -print0 2>/dev/null | while IFS= read -r -d '' exe; do
                    if file "$exe" | grep -q "Mach-O"; then
                      echo "    Executable: ${exe#"$f/"}"
                      codesign --force --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" --options=runtime --timestamp "$exe" || exit 1
                    fi
                  done
                done < <(find "$f/Versions" -mindepth 1 -maxdepth 1 -type d ! -name "Current" ! -type l -print0 2>/dev/null)
                # 最后签 framework 自身
                codesign --force --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" --options=runtime --timestamp "$f"
              }
            fi
            SIGN_ARGS=(--force --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" --options=runtime --timestamp)
            if [[ "$(basename "$f")" == "wallpaper-wgpu" && -f "WallpaperRenderer.entitlements" ]]; then
              SIGN_ARGS+=(--entitlements "WallpaperRenderer.entitlements")
            fi
            codesign "${SIGN_ARGS[@]}" "$f"
          }

          strip_unsupported_slices build/WaifuX.app/Contents/Resources/Resources/steamcmd
          strip_unsupported_slices build/WaifuX.app/Contents/Resources/steamcmd

          find build/WaifuX.app/Contents/Resources -type f | while read -r f; do
            if file "$f" | grep -qE "Mach-O|ELF"; then
              sign_embedded_code "$f"
            fi
          done
          find build/WaifuX.app/Contents/Resources -type d \( -name "*.app" -o -name "*.framework" \) -print 2>/dev/null \
            | awk '{ print length, $0 }' | sort -rn | cut -d' ' -f2- \
            | while read -r f; do
              sign_embedded_code "$f"
            done
          if [[ -d build/WaifuX.app/Contents/Frameworks ]]; then
            find build/WaifuX.app/Contents/Frameworks -maxdepth 1 -type d -name "*.framework" | while read -r f; do
              sign_embedded_code "$f"
            done
          fi

          # 签名 PlugIns 中的 app extension
          if [[ -d build/WaifuX.app/Contents/PlugIns ]]; then
            find build/WaifuX.app/Contents/PlugIns -name "*.appex" | while read -r f; do
              echo "  Signing extension: $(basename $f)"
              sign_embedded_code "$f"
            done
          fi

          if [[ -n "${WAIFUX_APP_PROVISIONING_PROFILE_PATH:-}" && -f "$WAIFUX_APP_PROVISIONING_PROFILE_PATH" ]]; then
            cp "$WAIFUX_APP_PROVISIONING_PROFILE_PATH" build/WaifuX.app/Contents/embedded.provisionprofile
          fi
          codesign --force --options=runtime --timestamp \
            --entitlements WaifuX.entitlements \
            --sign "${{ vars.APPLE_SIGNING_IDENTITY }}" build/WaifuX.app
          APP_ENT_CHECK=$(codesign -d --entitlements - build/WaifuX.app 2>/dev/null || true)
          if ! echo "$APP_ENT_CHECK" | grep -q "com.apple.security.application-groups"; then
            echo "  ❌ App missing application-groups entitlement"
            echo "$APP_ENT_CHECK" | head -20
            exit 1
          fi
          # --strict 对某些第三方 dylib（steamclient.dylib）可能误报，
          # 但实际功能不受影响，因此不因验证失败而中断构建。
          codesign --verify --deep --strict --verbose=2 build/WaifuX.app 2>/dev/null || true

          set +e
          create-dmg \
            --volname "WaifuX" \
            --window-size 540 400 \
            --app-drop-link 400 185 \
            --hide-extension "WaifuX.app" \
            --no-internet-enable \
            build/WaifuX.dmg \
            build/WaifuX.app
          CREATE_DMG_STATUS=$?
          set -e
          if [ $CREATE_DMG_STATUS -ne 0 ]; then
            echo "⚠️ create-dmg failed, falling back to hdiutil..."
            rm -f build/WaifuX.dmg build/rw.*.WaifuX.dmg
            hdiutil create -volname "WaifuX" \
              -srcfolder build/WaifuX.app \
              -ov -format UDZO \
              -imagekey zlib-level=9 \
              build/WaifuX.dmg
          fi

          NOTARY_OUTPUT=$(xcrun notarytool submit build/WaifuX.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)
          echo "$NOTARY_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARY_OUTPUT" | grep -m1 "id:" | awk '{print $2}' | tr -d '[:space:]')
          STATUS=$(echo "$NOTARY_OUTPUT" | awk '/^  status:/{print $2; exit}' | tr -d '[:space:]')
          if [ "$STATUS" != "Accepted" ]; then
            echo "=== Notarization Log ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1 || true
            echo "========================"
            exit 1
          fi

          for i in {1..5}; do
            if xcrun stapler staple build/WaifuX.dmg; then
              echo "✅ 签名+公证完成"
              break
            fi
            if [ $i -eq 5 ]; then
              exit 1
            fi
            sleep 30
          done

      - name: Setup Sparkle tools
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz" -o /tmp/Sparkle.tar.xz
          cd /tmp && tar xJf Sparkle.tar.xz
          echo "/tmp/Sparkle/bin" >> $GITHUB_PATH

      - name: Sign DMG and generate appcast.xml
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="build/WaifuX.dmg"

          # 签名 DMG 获取 Ed25519 签名
          SIGN_OUTPUT=$(sign_update -s "$SPARKLE_PRIVATE_KEY" "$DMG_PATH" 2>&1)
          echo "sign_update output: $SIGN_OUTPUT"
          ED_SIG=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')
          if [ -z "$ED_SIG" ]; then
            echo "❌ Failed to sign DMG with Sparkle"
            echo "Debug: DMG_PATH=$DMG_PATH"
            echo "Debug: DMG exists: $([ -f "$DMG_PATH" ] && echo yes || echo no)"
            ls -la "$DMG_PATH" 2>/dev/null || echo "Debug: DMG not found at $DMG_PATH"
            exit 1
          fi
          echo "✅ DMG signed: $ED_SIG"

          # 获取文件大小
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          PUB_DATE=$(date -R)

          # 用 Python 生成 appcast.xml（避免 sed 正则元字符问题：base64 签名含 + / 等）
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"
          python3 -c "
          import sys
          changelog = sys.argv[5].replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;')
          lines = changelog.split('\n')
          items = ''.join('<li>{}</li>'.format(l.lstrip('- ')) for l in lines if l.strip().startswith('- '))
          description = '<h3>WaifuX {}</h3><ul>{}</ul>'.format(sys.argv[1], items) if items else '<p>WaifuX {}</p>'.format(sys.argv[1])

          template = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <rss version=\"2.0\" xmlns:sparkle=\"http://www.andymatuschak.org/xml-namespaces/sparkle\" xmlns:dc=\"http://purl.org/dc/elements/1.1/\">
            <channel>
              <title>WaifuX</title>
              <link>https://jipika.github.io/WaifuX/appcast.xml</link>
              <description>WaifuX Updates</description>
              <language>zh</language>
              <item>
                <title>Version {version}</title>
                <sparkle:version>{version}</sparkle:version>
                <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
                <pubDate>{pub_date}</pubDate>
                <description><![CDATA[{desc}]]></description>
                <enclosure
                  url=\"https://github.com/jipika/WaifuX/releases/download/v{version}/WaifuX.dmg\"
                  type=\"application/octet-stream\"
                  length=\"{size}\"
                  sparkle:edSignature=\"{sig}\"
                />
              </item>
            </channel>
          </rss>'''
          xml = template.format(
            version=sys.argv[1],
            pub_date=sys.argv[2],
            size=sys.argv[3],
            sig=sys.argv[4],
            desc=description
          )
          with open('Docs/appcast.xml', 'w') as f:
            f.write(xml)
          " "$VERSION" "$PUB_DATE" "$DMG_SIZE" "$ED_SIG" "$CHANGELOG"

          echo "✅ Generated Docs/appcast.xml:"
          cat Docs/appcast.xml

      - name: Generate Changelog
        id: changelog
        run: |
          # 获取上一个 tag（用于生成变更日志）
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            # 从上一个 tag 到当前提交的 commit messages 生成日志
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges | head -30)
            echo "Generated changelog from $PREV_TAG to $GITHUB_REF_NAME:"
            echo "$CHANGELOG"
          else
            CHANGELOG="- Initial release"
            echo "No previous tag found, using default changelog"
          fi

          # 写入 GITHUB_OUTPUT 供后续 step 使用
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Release Asset
        # workflow_dispatch 仅用于测试构建/签名，不发布 release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: build/WaifuX.dmg
          name: WaifuX ${{ steps.version.outputs.version }}
          body: |
            ## 更新内容

            ${{ steps.changelog.outputs.changelog }}

            ## 版本信息

            - 版本号: ${{ steps.version.outputs.version }}
            - Commit: ${{ github.sha }}

            ---

            ## ☕ 支持开源

            如果你觉得 WaifuX 对你有帮助，欢迎通过以下方式支持项目的持续发展：

            - **WaifuX 用户交流群**: [点击加入](https://qm.qq.com/q/SRCj8msygq) 👈 971414910

            <p align="left">
              <img src="https://raw.githubusercontent.com/jipika/WaifuX/main/reward.jpg" height="280" alt="微信赞赏码" />
              &nbsp;&nbsp;&nbsp;&nbsp;
              <img src="https://raw.githubusercontent.com/jipika/WaifuX/main/afdian_reward.jpg" height="280" alt="爱发电赞助码" />
            </p>

            **给项目点个 Star ⭐️** 同样是对开发者最大的鼓励！每一份支持都是我继续维护和迭代这款应用的动力。感谢使用 WaifuX 💜
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # workflow_dispatch 测试构建时，上传 DMG 到 Actions Artifacts（不会发布给用户）
      - name: Upload DMG as Artifact (test build)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: WaifuX-test-${{ github.sha }}
          path: build/WaifuX.dmg
          retention-days: 3

      # 提交更新后的 appcast.xml 到 GitHub Pages
      - name: Update appcast on GitHub Pages
        if: github.event_name != 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Docs/appcast.xml
          if git diff --cached --quiet; then
            echo "appcast.xml unchanged, skipping commit"
          else
            git commit -m "chore: update appcast.xml for v${{ steps.version.outputs.version }}"
            git push
            echo "✅ appcast.xml committed and pushed"
          fi
