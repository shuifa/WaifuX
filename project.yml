name: WaifuX
options:
  bundleIdPrefix: com.waifux
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"

# 共享 Scheme 纳入仓库，避免仅存在 xcuserdata 时换机/重装后 Cmd+R 无可用方案
schemes:
  WaifuX:
    build:
      targets:
        WaifuX: all
        WaifuXWallpaperExtension: all
    run:
      config: Debug
    archive:
      config: Release

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"
  Kanna:
    url: https://github.com/tid-kijyun/Kanna.git
    from: "5.2.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.8.0"
  Cache:
    url: https://github.com/hyperoslo/Cache.git
    from: "7.4.0"

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: H6W325NJX2
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  WaifuX:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Utilities
      - path: Components
      - path: DesignSystem
      - path: Metal
      - path: Assets.xcassets
      # 含 wallpaper-wgpu（新 Metal 渲染器）、wallpaperengine-cli（旧离线烘焙 renderer）、dxc、dylib 等；assets/ 用于构建时内嵌
      - path: Resources
        type: folder
        buildPhase: resources
        excludes:
          - assets
          - assets/**
          - zip_data.s
          - zip_data.o
          - zip_accessor.c
          - zip_accessor.o
      - path: AnimeRules
        type: folder
        buildPhase: resources
      # 根目录源文件（未被以上子目录覆盖）
      - path: WallpaperEngineEmbeddedAssets.swift
    settings:
      base:
        PRODUCT_NAME: WaifuX
        PRODUCT_BUNDLE_IDENTIFIER: com.waifux.app
        MARKETING_VERSION: 38.0.121
        CURRENT_PROJECT_VERSION: 38
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: H6W325NJX2
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
        # 内嵌 assets zip 的 .o 文件由 scripts/build-wallpaper-wgpu.sh 手动生成并提交。
        OTHER_LDFLAGS: $(inherited) $(SRCROOT)/Resources/zip_data.o $(SRCROOT)/Resources/zip_accessor.o
    dependencies:
      - package: SwiftSoup
      - package: Kanna
      - package: Kingfisher
      - package: Cache
      - target: WaifuXWallpaperExtension
        embed: true
    postBuildScripts:
      - basedOnDependencyAnalysis: false
        script: |
          FRAMEWORKS_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Frameworks"
          if [ -d "$FRAMEWORKS_DIR" ]; then
            for framework in "$FRAMEWORKS_DIR"/*.framework; do
              if [ -f "$framework/Info.plist" ]; then
                mkdir -p "$framework/Versions/Current/Resources"
                if [ ! -f "$framework/Versions/Current/Resources/Info.plist" ]; then
                  mv "$framework/Info.plist" "$framework/Versions/Current/Resources/Info.plist"
                  ln -sf "Versions/Current/Resources/Info.plist" "$framework/Info.plist"
                fi
                if [ ! -L "$framework/Resources" ]; then
                  ln -sf "Versions/Current/Resources" "$framework/Resources"
                fi
                execName=$(basename "$framework" .framework)
                if [ -f "$framework/$execName" ] && [ ! -L "$framework/$execName" ]; then
                  mv "$framework/$execName" "$framework/Versions/Current/$execName"
                  ln -sf "Versions/Current/$execName" "$framework/$execName"
                fi
                if [ -d "$framework/Headers" ] && [ ! -L "$framework/Headers" ]; then
                  mv "$framework/Headers" "$framework/Versions/Current/Headers"
                  ln -sf "Versions/Current/Headers" "$framework/Headers"
                fi
                if [ -d "$framework/Modules" ] && [ ! -L "$framework/Modules" ]; then
                  mv "$framework/Modules" "$framework/Versions/Current/Modules"
                  ln -sf "Versions/Current/Modules" "$framework/Modules"
                fi
                if [ -d "$framework/_CodeSignature" ]; then
                  rm -rf "$framework/_CodeSignature"
                fi
                find "$framework" -name ".DS_Store" -delete 2>/dev/null || true
              fi
            done
          fi
      - basedOnDependencyAnalysis: false
        script: |
          # 修复旧 wallpaperengine-cli 相关 dylib 的 @@HOMEBREW_ 占位符路径
          CLI_LIB_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Resources/lib"
          if [[ -d "$CLI_LIB_DIR" ]]; then
            for f in "$CLI_LIB_DIR"/*.dylib; do
              [[ -L "$f" ]] && continue
              [[ ! -f "$f" ]] && continue
              otool -L "$f" 2>/dev/null | tail -n +2 | while IFS= read -r line; do
                dep_path=$(echo "$line" | awk '{print $1}')
                if [[ "$dep_path" == *"@@HOMEBREW_CELLAR@@"* ]] || [[ "$dep_path" == *"@@HOMEBREW_PREFIX@@"* ]]; then
                  dep_base=$(basename "$dep_path")
                  echo "fix-dylib-cli: $(basename "$f") — ${dep_path} -> @loader_path/${dep_base}"
                  install_name_tool -change "$dep_path" "@loader_path/$dep_base" "$f" 2>/dev/null || true
                fi
              done
            done
            for f in "$CLI_LIB_DIR"/*.dylib; do
              [[ -L "$f" ]] && continue
              [[ ! -f "$f" ]] && continue
              codesign --force -s - "$f" 2>/dev/null || true
            done
          fi

          # Resources/assets 已通过 zip_data.o 嵌入主程序，不能再作为普通资源复制进 .app。
          # Xcode 的 folder reference 会保留整棵 Resources 目录，这里清掉仅用于构建的产物，避免包体重复膨胀。
          BUNDLED_RESOURCES_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Resources"
          if [[ -d "$BUNDLED_RESOURCES_DIR" ]]; then
            rm -rf "$BUNDLED_RESOURCES_DIR/assets"
            rm -f "$BUNDLED_RESOURCES_DIR"/zip_data.s \
                  "$BUNDLED_RESOURCES_DIR"/zip_data.o \
                  "$BUNDLED_RESOURCES_DIR"/zip_accessor.c \
                  "$BUNDLED_RESOURCES_DIR"/zip_accessor.o
          fi

          sign_file_if_present() {
            local f="$1"
            if [[ -f "$f" ]]; then
              codesign --force -s - "$f" 2>/dev/null || true
            fi
          }

          sign_wgpu_if_present() {
            local f="$1"
            local entitlements="${SRCROOT}/WallpaperRenderer.entitlements"
            if [[ -f "$f" ]]; then
              if [[ -f "$entitlements" ]]; then
                codesign --force --options runtime --entitlements "$entitlements" -s - "$f" 2>/dev/null || \
                  codesign --force -s - "$f" 2>/dev/null || true
              else
                codesign --force -s - "$f" 2>/dev/null || true
              fi
            fi
          }

          # Xcode folder reference 可能复制为 Contents/Resources/Resources/...；
          # 本地 Run 也要覆盖扁平与嵌套两种布局，避免只有打包脚本签名成功。
          for DXC_BIN in \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/dxc" \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Resources/dxc"; do
            if [[ -f "$DXC_BIN" ]]; then
              install_name_tool -add_rpath "@loader_path/lib" "$DXC_BIN" 2>/dev/null || true
              install_name_tool -add_rpath "@loader_path/../lib" "$DXC_BIN" 2>/dev/null || true
              sign_file_if_present "$DXC_BIN"
            fi
          done

          for WGPU_BIN in \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/wallpaper-wgpu" \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Resources/wallpaper-wgpu"; do
            sign_wgpu_if_present "$WGPU_BIN"
          done

          for CLI_BIN in \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/wallpaperengine-cli" \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Resources/wallpaperengine-cli" \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/wallpaperengine-cli"; do
            sign_file_if_present "$CLI_BIN"
          done

          for DXC_LIB in \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/lib/libdxcompiler.dylib" \
            "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Resources/lib/libdxcompiler.dylib"; do
            sign_file_if_present "$DXC_LIB"
          done
    entitlements:
      path: WaifuX.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.waifux.app

  WaifuXWallpaperExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WaifuXWallpaperExtension
    settings:
      base:
        PRODUCT_NAME: WaifuXWallpaperExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.waifux.app.wallpaperextension
        MARKETING_VERSION: 38.0.121
        CURRENT_PROJECT_VERSION: 38
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: H6W325NJX2
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: WaifuXWallpaperExtension/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: WaifuXWallpaperExtension/WallpaperExtension-Bridging-Header.h
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks
    entitlements:
      path: WaifuXWallpaperExtension/WaifuXWallpaperExtension.entitlements
